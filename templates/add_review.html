<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="stylesheet" href="/static/style.css">
<script>
    document.addEventListener('wheel', function (e) {
        if (e.ctrlKey) { e.preventDefault(); }
    }, { passive: false });
    document.addEventListener('keydown', function (e) {
        if (e.ctrlKey && (e.key === '=' || e.key === '-')) { e.preventDefault(); }
    });
</script>

<div class="top-bar">
    <div class="title-wrapper">
        <h1 class="title"> CineVerse</h1>
        <div class="watermark-nav">CREATED BY: <a href="https://instagram.com/rebeljayn" target="_blank"
        style="text-decoration: none; color: inherit;">JAYN</a></div>
    </div>
    <a href="/logout" class="logout-btn">Logout</a>
</div>


<div class="review-container">

    <div class="movie-preview">
        <img src="{{ movie.poster }}">
        <h2 class="preview-title">{{ movie.title }}</h2>
        <p>{{ movie.year }}</p>
        <p>{{ movie.genre }}</p>
        <div class="rating">
            <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#f5c518" stroke="transparent" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon></svg>
            <span>{{ movie.rating }}</span>
        </div>
        <p class="plot">{{ movie.plot }}</p>
    </div>

    <div class="review-box">
        <h2>Write Review</h2>

        <form method="POST">
            <input type="hidden" name="movie" value="{{ movie.title }}">
            <div class="star-rating">
                <input type="radio" id="star5" name="rating" value="5" /><label class="full" for="star5" title="5 stars"></label>
                <input type="radio" id="star4.5" name="rating" value="4.5" /><label class="half" for="star4.5" title="4.5 stars"></label>
                <input type="radio" id="star4" name="rating" value="4" /><label class="full" for="star4" title="4 stars"></label>
                <input type="radio" id="star3.5" name="rating" value="3.5" /><label class="half" for="star3.5" title="3.5 stars"></label>
                <input type="radio" id="star3" name="rating" value="3" /><label class="full" for="star3" title="3 stars"></label>
                <input type="radio" id="star2.5" name="rating" value="2.5" /><label class="half" for="star2.5" title="2.5 stars"></label>
                <input type="radio" id="star2" name="rating" value="2" /><label class="full" for="star2" title="2 stars"></label>
                <input type="radio" id="star1.5" name="rating" value="1.5" /><label class="half" for="star1.5" title="1.5 stars"></label>
                <input type="radio" id="star1" name="rating" value="1" required /><label class="full" for="star1" title="1 star"></label>
                <input type="radio" id="star0.5" name="rating" value="0.5" /><label class="half" for="star0.5" title="0.5 stars"></label>
            </div>
            <textarea name="review" placeholder="Your review..." required></textarea>

            <button>Submit</button>
        </form>

        <a href="/home" class="review-back">← Back</a>
    </div>

</div>
